<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>템플릿 파일</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<style>
    /* init */
    fieldset {
        border: 0;
    }
    legend {
        position: absolute;
        width: 1px;
        height: 1px;
        font-size: 0;
        left: -999px;
        top: -999px;
    }
    input[type="text"],
    input[type="password"],
    input[type="email"],
    select {
        height: 40px;
        border: 1px solid #d8d8d8;
        border-radius: 4px;
    }
    .search-box {margin-top: 300px;}
    .search-box {
        padding: 20px;
        background: #eee;
        border: 1px solid #d8d8d8;
        border-radius: 12px;
    }
    .search-list {
        display: flex;
        flex-wrap: wrap;
        row-gap: 20px;
    }
    .search-box dl {
        display: flex;
        align-items: center;
        width: 50%;
    }
    .search-box dl.period {
        width: 100%;
    }
    .search-box dt {
        width: 120px;
        padding-left: 20px;
        font-weight: 700;
    }
    .search-box dd {
        flex: 1;
    }
    .search-box :where(input, select){
        width: 100%;
    }
</style>
<body>
    <div class="search-box">
        <form>
            <fieldset>
                <legend>예시 검색 영역</legend>
                <div class="search-list">
                    <dl>
                        <dt>
                            <label>예시라벨1</label>
                        </dt>
                        <dd>
                            <input type="text">
                        </dd>
                    </dl>
                    <dl>
                        <dt>
                            <label>예시라벨1</label>
                        </dt>
                        <dd>
                            <select>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                            </select>
                        </dd>
                    </dl>
                    <dl>
                        <dt>
                            <label>예시라벨1</label>
                        </dt>
                        <dd>
                            <input type="text">
                        </dd>
                    </dl>
                    <dl>
                        <dt>
                            <label>예시라벨1</label>
                        </dt>
                        <dd>
                            <select>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                            </select>
                        </dd>
                    </dl>
                    <dl class="period">
                        <dt>
                            <label>예시라벨3</label>
                        </dt>
                        <dd>
                            <input type="text">
                        </dd>
                    </dl>
                </div>
            </fieldset>
        </form>
    </div>
    </body>
<script>
</script>
</html>
