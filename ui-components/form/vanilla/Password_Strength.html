<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>템플릿 파일</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<style>
    .search-form {
        padding: 10px; 
        border: 1px solid #d8d8d8;
        border-radius: 5px;
        max-width: 400px;
    }
    .input-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .input-group input {
        border-radius: 6px;
        border: 1px solid #d8d8d8;
        height: 32px;
    }
    #weakness {font-weight: 700;}
    #weakness.weak {color: lightgreen;}
    #weakness.middle {color: orange;}
    #weakness.strong {color: red;}
</style>
<body>
    <div class="search-form">
        <div class="input-group">
            <label for="password">비밀번호 설정</label>
            <div>보안강도 : <span id="weakness"></span></div>
            <input type="password" id="password">
        </div>
    </div>
    </body>
<script>
    const passwordInput = document.querySelector('#password')
    const weakness = document.querySelector('#weakness')

    passwordInput.addEventListener('keyup', function(e){
        var passwordLength = e.currentTarget.value.length; 
        if (passwordLength == 0){
            weakness.innerText = ""   
        } else if (passwordLength < 8 && passwordLength != 0){
            weakness.innerText = "weak"
            weakness.className = 'weak'
        } else if (passwordLength < 13) {
            weakness.innerText = "middle"
            weakness.className = 'middle'
        } else {
            weakness.innerText = "strong"
            weakness.className = 'strong'
        }
    })
</script>
</html>
